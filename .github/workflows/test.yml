name: Tests

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/test.yml"
      - "hubspot-dedupe/**"
  pull_request:
    paths:
      - ".github/workflows/test.yml"
      - "hubspot-dedupe/**"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hubspot-dedupe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest
